<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SafeBasket v3 – Game-Theory-Based Decision Support</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080e1f;--bg2:#0f1e3a;--bg3:#162a55;
  --primary:#1E3A8A;--primary-l:#2d52b8;--primary-ll:#3b6fd4;
  --accent:#FACC15;--accent-d:#e6b800;--accent-glow:rgba(250,204,21,0.3);
  --glass:rgba(14,30,65,0.65);--border:rgba(59,111,212,0.22);
  --text:#f0f4ff;--text2:#93a8d4;--text3:#5a72a8;
  --green:#22c55e;--yellow:#f59e0b;--red:#ef4444;
  --green-bg:rgba(34,197,94,0.1);--yellow-bg:rgba(245,158,11,0.1);--red-bg:rgba(239,68,68,0.1);
  --radius:14px;--radius-lg:22px;--shadow:0 8px 32px rgba(0,0,0,0.35);
}
/* ══════════════════════════════════════════════════════════════════════
   GAME THEORY STYLES
   ══════════════════════════════════════════════════════════════════════ */

/* Game Theory Section Container */
.game-theory-section {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border-radius: var(--radius-lg);
  padding: 1.8rem;
  margin: 1.5rem 0;
  color: white;
  box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
}

.game-theory-section h3 {
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: 1.2rem;
  display: flex;
  align-items: center;
  gap: 10px;
}

/* Nash Equilibrium Display */
.nash-equilibrium-card {
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  border-radius: var(--radius);
  padding: 1.2rem;
  margin-bottom: 1rem;
}

.nash-status {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(34, 197, 94, 0.2);
  border: 1px solid rgba(34, 197, 94, 0.4);
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 0.8rem;
  font-weight: 600;
  margin-bottom: 0.8rem;
}

.nash-status.not-found {
  background: rgba(239, 68, 68, 0.2);
  border-color: rgba(239, 68, 68, 0.4);
}

.optimal-strategy {
  font-size: 1.1rem;
  font-weight: 600;
  margin: 0.8rem 0;
  padding: 0.8rem;
  background: rgba(255, 255, 255, 0.05);
  border-radius: 8px;
  border-left: 3px solid var(--accent);
}

/* Strategic Risk Assessment */
.risk-assessment-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1rem;
  margin-top: 1rem;
}

.risk-dimension {
  background: rgba(255, 255, 255, 0.05);
  border-radius: 10px;
  padding: 1rem;
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.risk-dimension-label {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  opacity: 0.8;
  margin-bottom: 0.5rem;
}

.risk-dimension-value {
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 0.3rem;
}

.risk-dimension-bar {
  height: 6px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 0.5rem;
}

.risk-dimension-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.6s ease;
}

/* Payoff Display */
.payoff-display {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-top: 1rem;
}

.payoff-card {
  background: rgba(255, 255, 255, 0.08);
  padding: 1rem;
  border-radius: 10px;
  text-align: center;
}

.payoff-label {
  font-size: 0.75rem;
  text-transform: uppercase;
  opacity: 0.8;
  margin-bottom: 0.5rem;
}

.payoff-value {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--accent);
}

/* Confidence Meter */
.confidence-meter {
  margin-top: 1.2rem;
}

.confidence-bar-container {
  height: 12px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 6px;
  overflow: hidden;
  margin-top: 0.5rem;
}

.confidence-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #22c55e);
  border-radius: 6px;
  transition: width 0.8s ease;
}

/* Strategic Recommendation Banner */
.strategic-banner {
  background: rgba(255, 255, 255, 0.15);
  border-radius: var(--radius);
  padding: 1.2rem;
  margin-top: 1.2rem;
  border-left: 4px solid var(--accent);
}

.strategic-banner-title {
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 0.5rem;
  opacity: 0.9;
}

.strategic-banner-text {
  font-size: 0.95rem;
  line-height: 1.6;
  opacity: 0.95;
}

/* Equilibrium Count Badge */
.equilibrium-count {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(250, 204, 21, 0.2);
  padding: 4px 12px;
  border-radius: 100px;
  font-size: 0.75rem;
  font-weight: 600;
  margin-left: 10px;
}

/* Alternative Strategies */
.alternatives-list {
  margin-top: 1rem;
}

.alternative-item {
  background: rgba(255, 255, 255, 0.05);
  padding: 0.8rem;
  border-radius: 8px;
  margin-bottom: 0.6rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.alternative-name {
  font-weight: 600;
  font-size: 0.9rem;
}

.alternative-payoff {
  font-size: 0.85rem;
  opacity: 0.8;
}

/* Mobile Responsive */
@media (max-width: 768px) {
  .game-theory-section {
    padding: 1.2rem;
  }
  
  .payoff-display {
    grid-template-columns: 1fr;
  }
  
  .risk-assessment-grid {
    grid-template-columns: 1fr;
  }
}
html{scroll-behavior:smooth}
body{font-family:'Bricolage Grotesque',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;letter-spacing:-0.01em}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--primary);border-radius:3px}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes pulse-ring{0%{transform:scale(1);opacity:1}100%{transform:scale(1.5);opacity:0}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes orb1{0%,100%{transform:translate(0,0)}50%{transform:translate(50px,-30px)}}
@keyframes orb2{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,40px)}}
@keyframes toast-in{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}

.fade-up{animation:fadeUp 0.55s ease both}
.fade-in{animation:fadeIn 0.4s ease both}
.float{animation:float 5s ease-in-out infinite}
.spinner{animation:spin 0.85s linear infinite}
.skeleton{background:linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.09) 50%,rgba(255,255,255,0.04) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}

/* GLASS */
.glass{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow)}

/* BUTTONS */
.btn{font-family:'Bricolage Grotesque',sans-serif;cursor:pointer;border:none;border-radius:var(--radius);font-size:0.92rem;font-weight:600;transition:all 0.22s;letter-spacing:-0.01em;display:inline-flex;align-items:center;gap:7px}
.btn-yellow{background:var(--accent);color:var(--bg);padding:0.65rem 1.5rem}
.btn-yellow:hover:not(:disabled){background:var(--accent-d);transform:translateY(-2px);box-shadow:0 6px 20px var(--accent-glow)}
.btn-yellow:disabled{opacity:0.55;cursor:not-allowed}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border);padding:0.65rem 1.4rem}
.btn-outline:hover{border-color:var(--primary-ll);color:var(--text);background:rgba(59,111,212,0.08)}
.btn-ghost{background:transparent;color:var(--text3);padding:0.5rem 1rem;font-size:0.85rem}
.btn-ghost:hover{color:var(--text2)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(239,68,68,0.2);padding:0.45rem 0.9rem;font-size:0.8rem}
.btn-danger:hover{background:rgba(239,68,68,0.18)}
.btn-sm{padding:0.45rem 1rem;font-size:0.82rem}
.btn-lg{padding:0.85rem 2rem;font-size:1rem}

/* INPUTS */
.input{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:var(--radius);padding:0.75rem 1.1rem;color:var(--text);font-family:'Bricolage Grotesque',sans-serif;font-size:0.92rem;outline:none;transition:border-color 0.22s,box-shadow 0.22s;width:100%}
.input::placeholder{color:var(--text3)}
.input:focus{border-color:var(--primary-ll);box-shadow:0 0 0 3px rgba(59,111,212,0.18)}
label.field-label{display:block;font-size:0.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}

/* NAVBAR */
.navbar{position:fixed;top:0;left:0;right:0;z-index:1000;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;background:rgba(8,14,31,0.8);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-bottom:1px solid rgba(59,111,212,0.12);transition:box-shadow 0.3s}
.navbar.scrolled{box-shadow:0 4px 24px rgba(0,0,0,0.4)}
.logo{display:flex;align-items:center;gap:9px;font-size:1.3rem;font-weight:700;color:var(--text);text-decoration:none;cursor:pointer}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--primary-ll),var(--accent));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem;box-shadow:0 0 12px var(--accent-glow)}
.logo span{color:var(--accent)}
.nav-links{display:flex;align-items:center;gap:1.8rem;list-style:none}
.nav-links a,.nav-links button{color:var(--text2);text-decoration:none;font-size:0.9rem;background:none;border:none;cursor:pointer;transition:color 0.2s;font-family:'Bricolage Grotesque',sans-serif}
.nav-links a:hover,.nav-links button:hover{color:var(--text)}
.nav-user{display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:700;color:var(--bg)}

/* SECTION */
section{padding:5.5rem 2rem;position:relative}
.section-inner{max-width:1180px;margin:0 auto;width:100%}
.section-tag{display:inline-block;background:rgba(250,204,21,0.08);border:1px solid rgba(250,204,21,0.2);color:var(--accent);font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;padding:4px 13px;border-radius:100px;margin-bottom:0.9rem}
.section-title{font-size:clamp(1.7rem,2.8vw,2.6rem);font-weight:700;margin-bottom:0.8rem;letter-spacing:-0.02em}
.section-sub{color:var(--text2);font-size:1rem;line-height:1.7;max-width:500px}
.text-center{text-align:center}
.section-sub.center{margin:0 auto}

/* HERO */
.hero{min-height:100vh;display:flex;align-items:center;overflow:hidden;padding-top:64px}
.hero-bg{position:absolute;inset:0;background:linear-gradient(135deg,#060c1c 0%,#0d1e3a 40%,#160e50 70%,#060c1c 100%)}
.orb{position:absolute;border-radius:50%;filter:blur(70px);pointer-events:none}
.orb1{width:480px;height:480px;background:radial-gradient(circle,rgba(30,58,138,0.45) 0%,transparent 70%);top:-80px;left:-80px;animation:orb1 14s ease-in-out infinite}
.orb2{width:360px;height:360px;background:radial-gradient(circle,rgba(250,204,21,0.07) 0%,transparent 70%);bottom:-40px;right:-60px;animation:orb2 18s ease-in-out infinite}
.hero-grid{max-width:1180px;margin:0 auto;width:100%;display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center;position:relative;z-index:1;padding:3rem 2rem}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(250,204,21,0.08);border:1px solid rgba(250,204,21,0.25);border-radius:100px;padding:5px 14px;font-size:0.78rem;color:var(--accent);margin-bottom:1.4rem;letter-spacing:0.08em;text-transform:uppercase}
.hero-badge::before{content:'';width:6px;height:6px;background:var(--accent);border-radius:50%;box-shadow:0 0 8px var(--accent)}
.hero-title{font-size:clamp(2.2rem,4.5vw,3.6rem);font-weight:800;line-height:1.08;margin-bottom:1rem;letter-spacing:-0.03em}
.hero-title .accent{color:var(--accent)}
.hero-title .dim{color:var(--text2)}
.hero-sub{font-size:1.1rem;color:var(--text2);margin-bottom:2.2rem;line-height:1.7;max-width:460px}
.hero-actions{display:flex;gap:0.9rem;flex-wrap:wrap}

/* MOCK CARD */
.mock-wrap{position:relative;animation:float 5s ease-in-out infinite}
.mock-card{background:rgba(12,24,52,0.85);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.8rem;box-shadow:0 24px 60px rgba(0,0,0,0.5)}
.mock-ring-wrap{position:relative;width:130px;height:130px;margin:0 auto 1.2rem;display:flex;align-items:center;justify-content:center}
.mock-ring-wrap svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.mock-score{font-size:2.2rem;font-weight:800;color:var(--green);z-index:1}
.mock-label{font-size:0.62rem;color:var(--text3);z-index:1}
.mock-pill{position:absolute;background:rgba(12,24,52,0.92);border:1px solid var(--border);border-radius:100px;padding:7px 14px;font-size:0.75rem;display:flex;align-items:center;gap:7px;backdrop-filter:blur(10px);white-space:nowrap;box-shadow:0 6px 18px rgba(0,0,0,0.3)}
.mp1{top:-14px;left:-24px;color:var(--green);border-color:rgba(34,197,94,0.22);animation:float 4s 1s ease-in-out infinite}
.mp2{bottom:20px;right:-30px;color:var(--accent);border-color:rgba(250,204,21,0.22);animation:float 4s 0.5s ease-in-out infinite}
.dot{width:6px;height:6px;border-radius:50%}

/* PAGE LAYOUT */
.page{padding-top:64px;min-height:100vh}
.page-inner{max-width:1100px;margin:0 auto;padding:2.5rem 2rem}
.page-header{margin-bottom:2.5rem}
.page-title{font-size:1.8rem;font-weight:700;margin-bottom:0.3rem}
.page-sub{color:var(--text2);font-size:0.95rem}

/* CARDS GRID */
.cards-grid{display:grid;gap:1.2rem}
.cards-2{grid-template-columns:1fr 1fr}
.cards-3{grid-template-columns:repeat(3,1fr)}
.cards-4{grid-template-columns:repeat(4,1fr)}
.stat-card{background:var(--glass);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;backdrop-filter:blur(16px)}
.stat-card .sc-icon{font-size:1.6rem;margin-bottom:0.8rem}
.stat-card .sc-value{font-size:2rem;font-weight:700;line-height:1}
.stat-card .sc-label{font-size:0.78rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-top:4px}

/* SCORE PILLS */
.score-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 11px;border-radius:100px;font-size:0.78rem;font-weight:700}
.sp-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(34,197,94,0.2)}
.sp-yellow{background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(245,158,11,0.2)}
.sp-red{background:var(--red-bg);color:var(--red);border:1px solid rgba(239,68,68,0.2)}
/* ═══════════════════════════════════════════════════════════════ */
/* NEW: ENHANCED FEATURES STYLES */
/* ═══════════════════════════════════════════════════════════════ */

/* Timeline Warning */
.timeline-warning{
  background:var(--red-bg);
  border:1px solid rgba(239,68,68,0.3);
  border-radius:var(--radius);
  padding:1rem;
  margin-bottom:1rem;
  color:var(--red);
  font-weight:600;
  font-size:0.9rem;
  display:flex;
  align-items:center;
  gap:0.5rem;
}

/* Detailed Grievances */
.detailed-grievances{
  display:grid;
  gap:0.8rem;
}

.grievance-card{
  background:rgba(255,255,255,0.02);
  border-left:4px solid;
  border-radius:var(--radius);
  padding:1rem;
  transition:transform 0.2s;
}

.grievance-card:hover{transform:translateX(4px)}

.grievance-card.severity-high{border-color:var(--red);background:var(--red-bg)}
.grievance-card.severity-medium{border-color:var(--yellow);background:var(--yellow-bg)}
.grievance-card.severity-low{border-color:var(--green);background:var(--green-bg)}

.grievance-header{
  display:flex;
  align-items:center;
  gap:0.8rem;
  margin-bottom:0.8rem;
  flex-wrap:wrap;
}

.severity-badge{
  padding:3px 10px;
  border-radius:12px;
  font-size:0.7rem;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.05em;
}

.severity-badge.high{background:rgba(239,68,68,0.2);color:var(--red)}
.severity-badge.medium{background:rgba(245,158,11,0.2);color:var(--yellow)}
.severity-badge.low{background:rgba(34,197,94,0.2);color:var(--green)}

.grievance-title{
  flex:1;
  font-weight:600;
  font-size:0.9rem;
}

.grievance-mentions{
  color:var(--text3);
  font-size:0.8rem;
}

.grievance-example{
  font-style:italic;
  color:var(--text2);
  margin-bottom:0.6rem;
  padding:0.6rem;
  background:rgba(0,0,0,0.2);
  border-radius:6px;
  font-size:0.82rem;
}

.grievance-recommendation{
  color:var(--text3);
  font-size:0.8rem;
}

/* Value for Money */
.value-analysis,.credibility-analysis{
  text-align:center;
}

.value-score-big,.cred-score-big{
  font-size:2.8rem;
  font-weight:800;
  margin:1rem 0;
}

.value-verdict,.cred-assessment{
  font-size:1rem;
  color:var(--text2);
  margin-bottom:1rem;
}

.value-stats{
  display:flex;
  justify-content:center;
  gap:2rem;
  margin-top:1rem;
}

.value-stat{
  display:flex;
  align-items:center;
  gap:0.5rem;
  font-size:0.9rem;
}

/* Reviewer Credibility */
.cred-details{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:0.8rem;
  margin-top:1rem;
}

.cred-item{
  text-align:center;
  padding:0.8rem;
  background:rgba(255,255,255,0.02);
  border-radius:var(--radius);
  border:1px solid var(--border);
}

.cred-item-value{
  font-size:1.4rem;
  font-weight:700;
  margin-bottom:0.3rem;
}

.cred-item-label{
  font-size:0.7rem;
  color:var(--text3);
  text-transform:uppercase;
  letter-spacing:0.05em;
}

/* Smart Recommendations */
.smart-recs-list{
  list-style:none;
  margin-bottom:1.5rem;
}

.smart-recs-list li{
  padding:0.8rem;
  margin-bottom:0.6rem;
  background:rgba(255,255,255,0.02);
  border-radius:var(--radius);
  border-left:3px solid var(--yellow);
  font-size:0.88rem;
  line-height:1.5;
}

.action-items-list{
  list-style:none;
}

.action-item{
  padding:0.7rem;
  margin-bottom:0.5rem;
  background:rgba(255,255,255,0.02);
  border-radius:var(--radius);
  color:var(--text2);
  font-size:0.82rem;
}

.action-item::before{
  content:"→ ";
  color:var(--accent);
  margin-right:0.3rem;
}
/* TABLE */
.table-wrap{background:var(--glass);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;backdrop-filter:blur(16px)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:0.9rem 1.3rem;font-size:0.72rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.09em;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.1);font-weight:500}
td{padding:0.9rem 1.3rem;font-size:0.88rem;border-bottom:1px solid rgba(59,111,212,0.07);vertical-align:middle}
tr:last-child td{border-bottom:none}

const {useState,useEffect,useRef,useCallback,useMemo}=React;
const API="http://localhost:5000";

/* ── API helper ─────────────────────────────────────────────────────── */
async function apiFetch(path,opts={}){
  const token=localStorage.getItem("sb_token");
  const headers={"Content-Type":"application/json",...(token?{Authorization:`Bearer ${token}`}:{})};
  const res=await fetch(API+path,{headers,...opts});
  const json=await res.json();
  return {ok:res.ok,status:res.status,data:json.data,message:json.message,json};
}

/* ── Toast context ──────────────────────────────────────────────────── */
function ToastContainer({toasts}){
  return <div className="toast-wrap">{toasts.map(t=>(
    <div key={t.id} className={`toast toast-${t.type}`}>
      {t.type==="error"?"⚠️":t.type==="success"?"✅":"ℹ️"} {t.message}
    </div>
  ))}</div>;
}

/* ── Score helpers ──────────────────────────────────────────────────── */
function scoreColor(s){return s>=70?"#22c55e":s>=40?"#f59e0b":"#ef4444"}
function scoreClass(s){return s>=70?"sp-green":s>=40?"sp-yellow":"sp-red"}
function recoClass(s){return s>=70?"reco-safe":s>=40?"reco-caution":"reco-risk"}
function classLabel(s){return s>=70?"Safe":s>=40?"Moderate Risk":"High Risk"}

/* ── TrustCircle ────────────────────────────────────────────────────── */
function TrustCircle({score}){
  const [disp,setDisp]=useState(0);
  const C=2*Math.PI*65,off=C-(disp/100)*C,col=scoreColor(score);
  useEffect(()=>{
    let v=0;const step=score/55;
    const t=setInterval(()=>{v+=step;if(v>=score){setDisp(score);clearInterval(t)}else setDisp(Math.floor(v));},16);
    return()=>clearInterval(t);
  },[score]);
  return(
    <div className="trust-wrap">
      <div className="trust-ring">
        <div className="trust-glow" style={{background:col}}/>
        <svg width="150" height="150" viewBox="0 0 150 150">
          <circle cx="75" cy="75" r="65" fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth="11"/>
          <circle cx="75" cy="75" r="65" fill="none" stroke={col} strokeWidth="11"
            strokeDasharray={C} strokeDashoffset={off} strokeLinecap="round"
            style={{transition:"stroke-dashoffset 1.4s cubic-bezier(0.4,0,0.2,1)"}}/>
        </svg>
        <div style={{zIndex:1,textAlign:"center"}}>
          <div className="trust-num" style={{color:col}}>{disp}</div>
          <div className="trust-sub">/ 100</div>
        </div>
      </div>
    </div>
  );
}

/* ── SentBar ────────────────────────────────────────────────────────── */
function SentBar({label,value,color}){
  const [w,setW]=useState(0);
  useEffect(()=>{const t=setTimeout(()=>setW(value),150);return()=>clearTimeout(t);},[value]);
  return(
    <div className="sent-row">
      <div className="sent-meta"><span style={{color:"rgba(240,244,255,0.85)"}}>{label}</span><span style={{color}}>{value?.toFixed(1)}%</span></div>
      <div className="sent-track"><div className="sent-fill" style={{width:`${w}%`,background:color}}/></div>
    </div>
  );
}

/* ── Auth Pages ─────────────────────────────────────────────────────── */
function AuthPage({mode,setPage,onLogin,addToast}){
  const [name,setName]=useState("");
  const [email,setEmail]=useState("");
  const [pwd,setPwd]=useState("");
  const [loading,setLoading]=useState(false);
  const isLogin=mode==="login";

  const handleSubmit=async()=>{
    if(!email||!pwd){addToast("Please fill all fields.","error");return;}
    if(!isLogin&&!name){addToast("Name is required.","error");return;}
    setLoading(true);
    try{
      const endpoint=isLogin?"/login":"/register";
      const body=isLogin?{email,password:pwd}:{name,email,password:pwd};
      const {ok,data,message}=await apiFetch(endpoint,{method:"POST",body:JSON.stringify(body)});
      if(!ok){addToast(message||"Authentication failed.","error");return;}
      localStorage.setItem("sb_token",data.token);
      onLogin(data.user);
      addToast(`Welcome${isLogin?"back":""}, ${data.user.name}!`,"success");
    }catch(e){addToast("Could not reach server. Make sure Flask is running.","error");}
    finally{setLoading(false);}
  };

  return(
    <div className="auth-page" style={{background:"var(--bg)"}}>
      <div className="orb orb1"/><div className="orb orb2"/>
      <div className="glass auth-card fade-up">
        <div style={{textAlign:"center",marginBottom:"1.8rem"}}>
          <div className="logo" style={{justifyContent:"center",marginBottom:"1.2rem"}}>
            <div className="logo-icon">🛡️</div>
            Safe<span style={{color:"var(--accent)"}}>Basket</span>
          </div>
          <div className="auth-title">{isLogin?"Welcome back":"Create account"}</div>
          <div className="auth-sub">{isLogin?"Sign in to your account":"Start analysing products for free"}</div>
        </div>
        {!isLogin&&(
          <div className="field">
            <label className="field-label">Full Name</label>
            <input className="input" placeholder="Your name" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSubmit()}/>
          </div>
        )}
        <div className="field">
          <label className="field-label">Email</label>
          <input className="input" type="email" placeholder="you@email.com" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSubmit()}/>
        </div>
        <div className="field">
          <label className="field-label">Password</label>
          <input className="input" type="password" placeholder="••••••••" value={pwd} onChange={e=>setPwd(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSubmit()}/>
        </div>
        <button className="btn btn-yellow" style={{width:"100%",justifyContent:"center",marginTop:"0.5rem"}} onClick={handleSubmit} disabled={loading}>
          {loading?<><span className="spinner-ring" style={{width:17,height:17,border:"2px solid rgba(0,0,0,0.2)",borderTopColor:"var(--bg)"}}/> Please wait…</>:(isLogin?"Sign In →":"Create Account →")}
        </button>
        <div className="auth-divider">{isLogin?"New here?":"Already have an account?"}</div>
        <button className="btn btn-outline" style={{width:"100%",justifyContent:"center"}} onClick={()=>setPage(isLogin?"register":"login")}>
          {isLogin?"Create an account":"Sign in instead"}
        </button>
      </div>
    </div>
  );
}

function PriceComparisonModal({analysisId, onClose}) {

  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  useEffect(() => {
    apiFetch(`/price-comparison/${analysisId}`)
      .then(({ok, data, message}) => {
        if (ok) {
          setSellers(data.sellers || []);
          setStatistics(data.statistics);
        } else {
          setError(message || "Failed to load prices");
        }
        setLoading(false);
      })
      .catch(err => {
        setError("Could not connect to server");
        setLoading(false);
      });
  }, [analysisId]);

  // Helper to get platform icon
  const getPlatformIcon = (platform) => {
    const icons = {
      "Amazon": "📦",
      "Flipkart": "🛒",
      "Myntra": "👕",
      "Snapdeal": "🏪",
      "Paytm Mall": "💳",
      "Tata CLiQ": "🏬",
      "JioMart": "🛍️",
      "Croma": "📱",
      "Other": "🌐"
    };
    return icons[platform] || "🛒";
  };

  // Helper to format currency
  const formatPrice = (price, currency) => {
    const symbol = currency === "INR" || currency === "₹" ? "₹" : currency;
    return `${symbol}${price.toLocaleString('en-IN', {maximumFractionDigits: 2})}`;
  };

  return (
    <div 
      style={{
        position:"fixed", 
        inset:0, 
        background:"rgba(0,0,0,0.85)",

                  alignItems: "flex-start"
                }}>
                  <span style={{color: "var(--red)", fontSize: "0.7rem"}}>▸</span>
                  <span>{risk}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    )}

    {/* Opportunity Analysis */}
    {result.game_theory_analysis.opportunity_analysis && (
      <div style={{
        background: "rgba(250, 204, 21, 0.05)",
        border: "1px solid var(--accent-d)",
        borderRadius: "var(--radius)",
        padding: "1.2rem"
      }}>
        <div style={{fontSize: "0.9rem", fontWeight: "600", color: "var(--accent)", marginBottom: "1rem"}}>
          💡 What You Should Know
        </div>
        
        <div style={{marginBottom: "0.8rem"}}>
          <div style={{fontSize: "0.75rem", color: "var(--text3)", fontWeight: "600", marginBottom: "0.3rem"}}>
            POTENTIAL UPSIDE
          </div>
          <div style={{fontSize: "0.85rem", color: "var(--text)", lineHeight: 1.5}}>
            {result.game_theory_analysis.opportunity_analysis.potential_upside}
          </div>
        </div>
        
        <div style={{marginBottom: "0.8rem"}}>
          <div style={{fontSize: "0.75rem", color: "var(--text3)", fontWeight: "600", marginBottom: "0.3rem"}}>
            POTENTIAL DOWNSIDE
          </div>
          <div style={{fontSize: "0.85rem", color: "var(--text)", lineHeight: 1.5}}>
            {result.game_theory_analysis.opportunity_analysis.potential_downside}
          </div>
        </div>
        
        <div>
          <div style={{fontSize: "0.75rem", color: "var(--text3)", fontWeight: "600", marginBottom: "0.3rem"}}>
            OUR ADVICE
          </div>
          <div style={{fontSize: "0.85rem", color: "var(--text)", lineHeight: 1.5}}>
            {result.game_theory_analysis.opportunity_analysis.alternatives_suggestion}
          </div>
        </div>
      </div>
    )}
  </div>
)}
      </div>

      {/* Conditionally render the modal at the end of the page */}
      {showComparison && result && (
        <PriceComparisonModal 
          analysisId={result.analysis_id} 
          onClose={() => setShowComparison(false)} 
        />
      )}
    </div>
  );
}
/* ── Compare Page ───────────────────────────────────────────────────── */
function ComparePage({addToast}){
  const [url1,setUrl1]=useState("");
  const [url2,setUrl2]=useState("");
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);

  const handleCompare=async()=>{
    if(!url1.trim()||!url2.trim()){addToast("Please enter both product URLs.","error");return;}
    setLoading(true);setResult(null);
    try{
      const {ok,data,message}=await apiFetch("/compare",{method:"POST",body:JSON.stringify({url1:url1.trim(),url2:url2.trim()})});
      if(!ok){addToast(message||"Comparison failed.","error");return;}
      setResult(data);
      addToast("Comparison complete!","success");
    }catch(e){addToast("Could not reach backend.","error");}
    finally{setLoading(false);}
  };

  const renderProduct=(p,isWinner)=>(
    <div className={`compare-col${isWinner?" winner":""}`}>
      {isWinner&&<div className="winner-badge">🏆 Better Choice</div>}
      {p.product_image&&(
      <img src={p.product_image} alt={p.product_name} 
           style={{width:"100%",maxWidth:"150px",height:"150px",objectFit:"contain",
                   borderRadius:"12px",background:"white",padding:"12px",margin:"0 auto 1rem",display:"block"}}/>
    )}
      <p style={{fontSize:"0.82rem",color:"var(--text2)",marginBottom:"1rem",wordBreak:"break-all"}}>{p.product_name||p.url}</p>
      <div style={{textAlign:"center",marginBottom:"1.2rem"}}>
        <TrustCircle score={p.trust_score}/>
        <span className={`score-pill ${scoreClass(p.trust_score)}`} style={{marginTop:"0.5rem",display:"inline-block"}}>{classLabel(p.trust_score)}</span>
      </div>
      {[["⭐ Avg Rating",`${p.average_rating}/5`],["💬 Reviews",p.total_reviews],["🤖 Fake Risk",`${p.fake_review_risk}% (${p.fake_risk_label})`],["😊 Positive",`${p.sentiment?.positive?.toFixed(1)}%`],["😢 Negative",`${p.sentiment?.negative?.toFixed(1)}%`]].map(([l,v])=>(
        <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid var(--border)",fontSize:"0.85rem"}}>
          <span style={{color:"var(--text2)"}}>{l}</span>
          <span style={{fontWeight:600}}>{v}</span>
        </div>
      ))}
      <div style={{marginTop:"1rem",padding:"0.8rem",background:"rgba(255,255,255,0.02)",borderRadius:"10px",fontSize:"0.8rem",color:"var(--text2)",lineHeight:1.6}}>{p.recommendation}</div>
    </div>
  );

  return(
    <div className="page">
      <div className="page-inner">
        <div className="page-header">
          <h1 className="page-title">Compare Products</h1>
          <p className="page-sub">Enter two product URLs to compare their trust profiles side by side.</p>
        </div>
        <div className="glass analyzer-card" style={{marginBottom:"1.5rem"}}>
          <div className="cards-grid cards-2" style={{gap:"1rem",marginBottom:"1rem"}}>
            <div>
              <label className="field-label">Product 1 URL</label>
              <input className="input" placeholder="https://amazon.in/dp/..." value={url1} onChange={e=>setUrl1(e.target.value)}/>
            </div>
            <div>
              <label className="field-label">Product 2 URL</label>
              <input className="input" placeholder="https://amazon.in/dp/..." value={url2} onChange={e=>setUrl2(e.target.value)}/>
            </div>
          </div>
          <button className="btn btn-yellow" onClick={handleCompare} disabled={loading}>
            {loading?<><span className="spinner-ring" style={{width:16,height:16,border:"2px solid rgba(0,0,0,0.2)",borderTopColor:"var(--bg)"}}/> Comparing…</>:<>⚖️ Compare Products</>}
          </button>
        </div>
        {result&&(
          <div className="fade-in">
            <div style={{textAlign:"center",marginBottom:"1.2rem",padding:"0.9rem",background:"rgba(250,204,21,0.07)",border:"1px solid rgba(250,204,21,0.2)",borderRadius:"var(--radius)",color:"var(--accent)",fontWeight:600}}>{result.verdict}</div>
            <div className="compare-grid">
              {renderProduct(result.product_1,result.winner_url===result.product_1.url)}
              {renderProduct(result.product_2,result.winner_url===result.product_2.url)}
            </div>
            
            {/* Game Theory Comparison (NEW!) */}
            {result.products && result.products[0].game_theory && (
              <div style={{gridColumn:"1/-1",marginTop:"1rem",padding:"1rem",background:"rgba(102,126,234,0.1)",borderRadius:"10px"}}>
                <h4 style={{fontSize:"0.9rem",marginBottom:"0.8rem",color:"var(--accent)"}}>
                  🎮 Game-Theoretic Comparison
                </h4>
                <div className="cards-grid cards-2" style={{gap:"1rem"}}>
                  {result.products.map((p,idx)=>(
                    <div key={idx}>
                      <div style={{fontSize:"0.8rem",color:"var(--text2)",marginBottom:"0.5rem"}}>
                        {p.product_name}
                      </div>
                      <div style={{display:"grid",gap:"0.5rem"}}>
                        <div style={{display:"flex",justifyContent:"space-between"}}>
                          <span style={{fontSize:"0.75rem"}}>Nash Equilibria:</span>
                          <span style={{fontWeight:600}}>{p.game_theory.nash_equilibria}</span>
                        </div>
                        <div style={{display:"flex",justifyContent:"space-between"}}>
                          <span style={{fontSize:"0.75rem"}}>Optimal Strategy:</span>
                          <span style={{fontWeight:600}}>{p.game_theory.optimal_strategy}</span>
                        </div>
                        <div style={{display:"flex",justifyContent:"space-between"}}>
                          <span style={{fontSize:"0.75rem"}}>Strategic Risk:</span>
                          <span style={{fontWeight:600}}>{p.game_theory.risk_score}%</span>
                        </div>
                        <div style={{display:"flex",justifyContent:"space-between"}}>
                          <span style={{fontSize:"0.75rem"}}>Confidence:</span>
                          <span style={{fontWeight:600}}>{p.game_theory.confidence}%</span>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
                
                {result.utility_difference && (
                  <div style={{marginTop:"1rem",padding:"0.8rem",background:"rgba(250,204,21,0.15)",borderRadius:"8px"}}>
                    <strong style={{color:"var(--accent)"}}>Expected Utility Difference:</strong> {result.utility_difference} points
                  </div>
                )}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

/* ── History Page ───────────────────────────────────────────────────── */
function HistoryPage({addToast}){
  const [records,setRecords]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    apiFetch("/history").then(({ok,data,message})=>{
      if(ok)setRecords(data.records||[]);
      else addToast(message||"Failed to load history.","error");
      setLoading(false);
    }).catch(()=>{addToast("Server unreachable.","error");setLoading(false);});
  },[]);

  const handleDelete=async(id)=>{
    const {ok,message}=await apiFetch(`/history/${id}`,{method:"DELETE"});
    if(ok)setRecords(r=>r.filter(x=>x.id!==id));
    else addToast(message||"Delete failed.","error");
  };

  if(loading)return<div className="page"><div className="loading-center"><div className="spinner-ring"/></div></div>;

  return(
    <div className="page">
      <div className="page-inner">
        <div className="page-header">
          <h1 className="page-title">Analysis History</h1>
          <p className="page-sub">{records.length} product{records.length!==1?"s":""} analysed.</p>
        </div>
        {records.length===0?(
          <div className="empty-state glass"><div className="em">📭</div><p>No analyses yet.</p></div>
        ):(
          <div className="table-wrap" style={{maxHeight:520,overflow:"auto"}}>
            <table>
              <thead><tr><th>#</th><th>Product</th><th>Trust Score</th><th>Fake Risk</th><th>Classification</th><th>Date</th><th>Action</th></tr></thead>
              <tbody>
                {records.map((r,i)=>(
                  <tr key={r.id}>
                    <td style={{color:"var(--text3)",fontSize:"0.78rem"}}>{i+1}</td>
                    <td className="url-cell"><a href={r.product_url} target="_blank" rel="noopener noreferrer" style={{color:"var(--text2)",textDecoration:"none"}}>{r.product_name||r.product_url}</a></td>
                    <td><span className={`score-pill ${scoreClass(r.trust_score)}`}>{r.trust_score}/100</span></td>
                    <td><span style={{fontSize:"0.82rem",color:scoreColor(100-r.fake_review_risk)}}>{r.fake_risk_label}</span></td>
                    <td><span style={{fontSize:"0.82rem",color:scoreColor(r.trust_score)}}>{r.classification}</span></td>
                    <td style={{color:"var(--text3)",fontSize:"0.78rem"}}>{new Date(r.analyzed_at).toLocaleDateString()}</td>
                    <td><button className="btn btn-danger" onClick={()=>handleDelete(r.id)}>🗑 Delete</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Admin Page ─────────────────────────────────────────────────────── */

  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);

    apiFetch("/admin/stats").then(({ok,data:d,message})=>{
      if(ok)setData(d);
      else addToast(message||"Admin access denied.","error");
      setLoading(false);
    }).catch(()=>{addToast("Server unreachable.","error");setLoading(false);});

  if(loading)return<div className="page"><div className="loading-center"><div className="spinner-ring"/></div></div>;
  if(!data)return<div className="page"><div className="page-inner"><p style={{color:"var(--red)"}}>Admin access required.</p></div></div>;

  return(
    <div className="page">
      <div className="page-inner">
        <div className="page-header">
          <h1 className="page-title">Admin Panel</h1>
          <p className="page-sub">Platform-wide analytics and user management.</p>
        </div>
        <div className="cards-grid cards-3" style={{marginBottom:"1.5rem"}}>
          {[
            ["👥","Total Users",data.total_users,"var(--accent)"],

          ))}

                <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Role</th><th>Joined</th></tr></thead>
                <tbody>
                  {data.recent_users.map((u,i)=>(
                    <tr key={u.id}>
                      <td style={{color:"var(--text3)",fontSize:"0.78rem"}}>{i+1}</td>
                      <td style={{fontWeight:500}}>{u.name}</td>
                      <td style={{color:"var(--text2)",fontSize:"0.85rem"}}>{u.email}</td>
                      <td><span className={`score-pill ${u.role==="admin"?"sp-yellow":"sp-green"}`}>{u.role}</span></td>
                      <td style={{color:"var(--text3)",fontSize:"0.78rem"}}>{new Date(u.created_at).toLocaleDateString()}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── App ────────────────────────────────────────────────────────────── */
function App(){
  const [user,setUser]=useState(null);
  const [page,setPage]=useState("landing");
  const [toasts,setToasts]=useState([]);
  const [checking,setChecking]=useState(true);

  const addToast=useCallback((message,type="info")=>{
    const id=Date.now();
    setToasts(p=>[...p,{id,message,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3800);
  },[]);

  // Restore session on load
  useEffect(()=>{
    const token=localStorage.getItem("sb_token");
    if(token){
      apiFetch("/me").then(({ok,data})=>{
        if(ok){setUser(data.user);setPage("dashboard");}
        else localStorage.removeItem("sb_token");
        setChecking(false);
      }).catch(()=>setChecking(false));
    }else setChecking(false);
  },[]);

  const handleLogin=u=>{setUser(u);setPage("dashboard");};
  const handleLogout=()=>{localStorage.removeItem("sb_token");setUser(null);setPage("landing");addToast("Logged out successfully.","info");};

  useEffect(()=>{
    if(!user&&!["landing","login","register"].includes(page))setPage("landing");
  },[user,page]);

  if(checking)return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><div className="spinner-ring"/></div>;

  const renderPage=()=>{
    if(!user){
      if(page==="login")   return <AuthPage mode="login"    setPage={setPage} onLogin={handleLogin} addToast={addToast}/>;
      if(page==="register")return <AuthPage mode="register" setPage={setPage} onLogin={handleLogin} addToast={addToast}/>;
      return <Landing setPage={setPage}/>;
    }
    switch(page){
      case "dashboard": return <Dashboard user={user} setPage={setPage} addToast={addToast}/>;
      case "analyze":   return <AnalyzePage addToast={addToast}/>;
      case "compare":   return <ComparePage addToast={addToast}/>;
      case "history":   return <HistoryPage addToast={addToast}/>;
      case "admin":     return <AdminPage addToast={addToast}/>;
      default:          return <Dashboard user={user} setPage={setPage} addToast={addToast}/>;
    }
  };

  return(
    <>
      <ToastContainer toasts={toasts}/>
      {user||["landing"].includes(page)?(
        <Navbar user={user} page={page} setPage={setPage} onLogout={handleLogout}/>
      ):null}
      {renderPage()}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
